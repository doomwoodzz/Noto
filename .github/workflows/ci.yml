name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: landing/package-lock.json
      - run: npm ci
      - run: npm run fetch-embedding-model
      - run: npm run lint
      - run: npm run typecheck:server
      - run: npm test
